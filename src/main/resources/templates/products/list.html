<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 목록 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-custom { background-color: #1a1a2e; }
        .navbar-custom .navbar-brand { color: #e94560; font-weight: 800; }
        .navbar-custom .nav-link { color: rgba(255,255,255,.8); }
        .navbar-custom .nav-link:hover { color: #fff; }
        .page-header { border-left: 4px solid #e94560; padding-left: 15px; margin-bottom: 20px; }
        .table-hover tbody tr:hover { background-color: rgba(233,69,96,.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">홈</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/products}">상품 목록</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm mt-1">로그아웃</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container bg-white p-4 p-md-5 rounded shadow-sm mb-5">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-end mb-4 page-header">
        <div>
            <h2 class="mb-1 fw-bold">상품 목록</h2>
            <small class="text-muted">
                총 <span th:text="${productPage.totalElements}"></span>개 상품
                (페이지 <span th:text="${productPage.number + 1}"></span>
                / <span th:text="${productPage.totalPages}"></span>)
            </small>
        </div>
        <a th:href="@{/products/add}" class="btn btn-danger">+ 상품 등록</a>
    </div>

    <div class="card bg-light border-0 mb-4 p-3">
        <form th:action="@{/products}" method="get" class="d-flex gap-2 mb-0">
            <input type="text" name="keyword" class="form-control bg-white"
                   placeholder="상품명으로 검색"
                   th:value="${keyword}"/>
            <button type="submit" class="btn btn-primary px-4">검색</button>
            <a th:href="@{/products}" class="btn btn-outline-secondary text-nowrap">초기화</a>
        </form>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th class="text-center" style="width: 5%">#</th>
                <th style="width: 25%">상품명</th>
                <th style="width: 30%">설명</th>
                <th class="text-end" style="width: 10%">가격</th>
                <th class="text-center" style="width: 8%">재고</th>
                <th class="text-center" style="width: 12%">등록일</th>
                <th class="text-center" style="width: 10%">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${productPage.isEmpty()}">
                <td colspan="7" class="text-center py-5 text-muted">
                    <i class="bi bi-search fs-3 d-block mb-2"></i>
                    등록된 상품이 없거나 검색 결과가 없습니다.
                </td>
            </tr>

            <tr th:unless="${productPage.isEmpty()}" th:each="p : ${productPage.content}">
                <td class="text-center text-muted" th:text="${p.id}">1</td>
                <td class="fw-bold text-dark">
                    <span th:text="${p.name}">상품명</span>
                </td>
                <td class="text-muted small text-truncate" style="max-width: 200px;" th:text="${p.description}">설명</td>
                <td class="text-end fw-semibold" th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + '원'">1,000원</td>
                <td class="text-center">
                    <span th:if="${p.stock > 0}" class="badge bg-success rounded-pill" th:text="${p.stock}">10</span>
                    <span th:unless="${p.stock > 0}" class="badge bg-danger rounded-pill">품절</span>
                </td>
                <td class="text-center small text-muted" th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd')}">2026-05-25</td>
                <td class="text-center">
                    <div class="d-flex justify-content-center gap-1">
                        <a th:href="@{|/products/${p.id}/edit|}" class="btn btn-sm btn-outline-primary px-2">수정</a>
                        <form th:action="@{|/products/${p.id}/delete|}" method="post" class="d-inline m-0">
                            <button type="submit" class="btn btn-sm btn-outline-danger px-2" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="mt-4" th:if="${productPage.totalPages > 0}">
        <ul class="pagination justify-content-center mb-0">
            <li class="page-item" th:classappend="${!productPage.hasPrevious()} ? 'disabled'">
                <a class="page-link"
                   th:href="${keyword != null} ? @{/products(page=${productPage.number - 1}, size=${productPage.size}, keyword=${keyword})} : @{/products(page=${productPage.number - 1}, size=${productPage.size})}">이전</a>
            </li>

            <li th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                class="page-item"
                th:classappend="${i == productPage.number} ? 'active'">
                <a class="page-link"
                   th:href="${keyword != null} ? @{/products(page=${i}, size=${productPage.size}, keyword=${keyword})} : @{/products(page=${i}, size=${productPage.size})}"
                   th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${!productPage.hasNext()} ? 'disabled'">
                <a class="page-link"
                   th:href="${keyword != null} ? @{/products(page=${productPage.number + 1}, size=${productPage.size}, keyword=${keyword})} : @{/products(page=${productPage.number + 1}, size=${productPage.size})}">다음</a>
            </li>
        </ul>
    </nav>
</div>

<div class="container mt-5 mb-3 text-center">
    <hr>
    <p class="text-muted small mb-0">
        학번: 2171130 │ 성명: 최주성 │
        <span th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
