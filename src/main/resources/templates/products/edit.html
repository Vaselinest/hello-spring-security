<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">상품 정보 수정</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{|/products/${productId}/edit|}" th:object="${product}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">상품명</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{name}">상품명 오류</div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label fw-bold">상품 설명</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="3" th:errorclass="is-invalid"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}">설명 오류</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label fw-bold">가격</label>
                                <input type="number" id="price" th:field="*{price}" class="form-control" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{price}">가격 오류</div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label fw-bold">재고</label>
                                <input type="number" id="stock" th:field="*{stock}" class="form-control" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{stock}">재고 오류</div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/products}" class="btn btn-outline-secondary">취소</a>
                            <button type="submit" class="btn btn-primary">수정 완료</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5 mb-3 text-center">
    <hr>
    <p class="text-muted small">
        학번: 2171130 │ 성명: 최주성 │
        <span th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
    </p>
</div>
</body>
</html>
