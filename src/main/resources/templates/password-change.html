<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">비밀번호 변경</h5>
                </div>
                <div class="card-body p-4">

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/password}" th:object="${passwordChangeDto}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">현재 비밀번호</label>
                            <input type="password" th:field="*{currentPassword}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{currentPassword}">오류</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">새 비밀번호 (8자 이상)</label>
                            <input type="password" th:field="*{newPassword}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{newPassword}">오류</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">새 비밀번호 확인</label>
                            <input type="password" th:field="*{newPasswordConfirm}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{newPasswordConfirm}">오류</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">비밀번호 변경</button>
                            <a th:href="@{/home}" class="btn btn-outline-secondary">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5 mb-3 text-center">
    <hr>
    <p class="text-muted small">
        학번: 2171130 │ 성명: 최주성 │
        <span th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
    </p>
</div>
</body>
</html>
